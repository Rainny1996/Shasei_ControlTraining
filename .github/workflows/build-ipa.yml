name: Build 毅练 IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (无签名)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          xcodebuild -version

      - name: Locate project
        id: locate
        run: |
          PROJECT_FILE=$(find . -name "毅练.xcodeproj" -maxdepth 3 | head -1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "::error::Could not locate 毅练.xcodeproj"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Found project at: $PROJECT_FILE (dir: $PROJECT_DIR)"

      - name: List schemes
        working-directory: ${{ steps.locate.outputs.PROJECT_DIR }}
        run: |
          set +e
          echo "=== xcodebuild -list ==="
          xcodebuild -list -project "毅练.xcodeproj" 2>&1 || echo "(list failed)"

      - name: Clean Build
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/* || true

      - name: Build App
        working-directory: ${{ steps.locate.outputs.PROJECT_DIR }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project "毅练.xcodeproj" \
            -scheme "毅练" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            | tee build.log
          BUILD_RC=${PIPESTATUS[0]}
          if [ "$BUILD_RC" -ne 0 ]; then
            echo "========== BUILD FAILED (exit $BUILD_RC) =========="
            echo "::error::BUILD FAILED"
            grep -E "error:|fatal error:" build.log | head -40 | while read -r line; do echo "::error::$line"; done
            exit 1
          fi
          echo "========== BUILD SUCCEEDED =========="

      - name: Debug - List build products
        if: always()
        run: |
          echo "=== .app files in DerivedData ==="
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" 2>/dev/null || echo "none"

      - name: Create IPA
        run: |
          set -o pipefail
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find any .app"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          rm -rf "$APP_PATH"/PlugIns 2>/dev/null || true
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r YiLian.ipa Payload
          echo "IPA created"
          ls -la YiLian.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: YiLian-ipa
          path: YiLian.ipa
          retention-days: 30

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: "**/build.log"
          retention-days: 7
