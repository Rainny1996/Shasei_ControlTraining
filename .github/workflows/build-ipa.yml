name: Build 毅练 IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (无签名)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          xcodebuild -version
          swift --version

      - name: Locate project
        id: locate
        run: |
          PROJECT_FILE=$(find . -name "*.xcodeproj" -maxdepth 3 | head -1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "::error::Could not locate any .xcodeproj"
            exit 1
          fi
          PROJECT_NAME=$(basename "$PROJECT_FILE")
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_NAME=$PROJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "Found project: $PROJECT_FILE"

      - name: Detect scheme
        id: scheme
        working-directory: ${{ steps.locate.outputs.PROJECT_DIR }}
        run: |
          set +e
          echo "=== xcodebuild -list ==="
          LIST_OUTPUT=$(xcodebuild -list -project "${{ steps.locate.outputs.PROJECT_NAME }}" 2>&1)
          echo "$LIST_OUTPUT"
          # 提取 Schemes 段落里的第一个 scheme
          SCHEME=$(echo "$LIST_OUTPUT" | awk '/Schemes:/{flag=1; next} flag && NF {gsub(/^[ \t]+/,""); print; exit}')
          if [ -z "$SCHEME" ]; then
            echo "::warning::Could not auto-detect scheme, falling back to 毅练"
            SCHEME="毅练"
          fi
          echo "Using scheme: $SCHEME"
          echo "SCHEME=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/* || true

      - name: Build App (unsigned)
        working-directory: ${{ steps.locate.outputs.PROJECT_DIR }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project "${{ steps.locate.outputs.PROJECT_NAME }}" \
            -scheme "${{ steps.scheme.outputs.SCHEME }}" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            | tee build.log
          BUILD_RC=${PIPESTATUS[0]}
          if [ "$BUILD_RC" -ne 0 ]; then
            echo "========== BUILD FAILED (exit $BUILD_RC) =========="
            echo "::error::BUILD FAILED"
            grep -E "error:|fatal error:" build.log | head -40 | while read -r line; do echo "::error::$line"; done
            exit 1
          fi
          echo "========== BUILD SUCCEEDED =========="

      - name: List build products
        if: always()
        working-directory: ${{ steps.locate.outputs.PROJECT_DIR }}
        run: |
          echo "=== .app files ==="
          find ./build -name "*.app" 2>/dev/null || echo "none"

      - name: Create IPA
        working-directory: ${{ steps.locate.outputs.PROJECT_DIR }}
        run: |
          set -o pipefail
          APP_PATH=$(find ./build -path "*Release-iphoneos/*.app" -maxdepth 5 | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ./build -name "*.app" | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find any .app"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          rm -rf "$APP_PATH"/PlugIns 2>/dev/null || true
          rm -rf Payload
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr YiLian.ipa Payload
          echo "IPA created:"
          ls -la YiLian.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: YiLian-ipa
          path: ${{ steps.locate.outputs.PROJECT_DIR }}/YiLian.ipa
          retention-days: 30

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: "**/build.log"
          retention-days: 7
