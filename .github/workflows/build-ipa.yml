name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Check Environment
        run: |
          echo "=== Xcode Version ==="
          xcodebuild -version
          echo ""
          echo "=== Available Xcode ==="
          ls /Applications/ | grep Xcode || true
          echo ""
          echo "=== XcodeGen Version ==="
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode Project
        run: |
          xcodegen generate --verbose 2>&1
          echo ""
          echo "=== Verify Project ==="
          if [ ! -d "ControlTraining.xcodeproj" ]; then
            echo "ERROR: ControlTraining.xcodeproj not found!"
            echo "Files in current directory:"
            ls -la
            exit 1
          fi
          echo "Project bundle contents:"
          ls -la ControlTraining.xcodeproj/
          echo ""
          echo "Project file size:"
          wc -l ControlTraining.xcodeproj/project.pbxproj

      - name: Verify Project Readable
        run: |
          xcodebuild -list -project ControlTraining.xcodeproj

      - name: Build App
        run: |
          xcodebuild build \
            -project ControlTraining.xcodeproj \
            -scheme ControlTraining \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            2>&1 | tee build.log

      - name: Debug - List build products
        if: always()
        run: |
          echo "=== .app files ==="
          find build -name "*.app" 2>/dev/null || echo "No .app files found"
          echo ""
          echo "=== Build products directory ==="
          ls -laR build/Build/Products/ 2>/dev/null || echo "Products directory not found"

      - name: Create IPA
        run: |
          APP_PATH=$(find build -name "ControlTraining.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find ControlTraining.app"
            echo "=== Build errors ==="
            grep -i "error:" build.log | head -30 || echo "No error lines found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ControlTraining.ipa Payload
          echo "IPA created successfully"
          ls -la ControlTraining.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ControlTraining-ipa
          path: ControlTraining.ipa
          retention-days: 30

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: build.log
          retention-days: 7