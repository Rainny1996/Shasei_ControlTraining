name: Build 毅练 IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (无签名)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnostics - Environment
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== ls -la (root) ==="
          ls -la
          echo "=== git ls-files ==="
          git ls-files | head -50
          echo "=== locale ==="
          locale
          echo "=== available Xcode.app ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "NONE"
          echo "=== xcodebuild path ==="
          which xcodebuild

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          xcodebuild -version
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"

      - name: Diagnostics - xcodebuild list
        run: |
          echo "=== xcodebuild -list ==="
          xcodebuild -list -project "毅练/毅练.xcodeproj" || echo "LIST FAILED with code $?"

      - name: Clean Build
        run: |
          rm -rf build build-output
          rm -rf ~/Library/Developer/Xcode/DerivedData/* || true

      - name: Build App (无签名)
        run: |
          xcodebuild build \
            -project "毅练/毅练.xcodeproj" \
            -target "毅练" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            BUILD_DIR="$PWD/build-output" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            > build.log 2>&1 || {
              echo "========== BUILD FAILED (exit $?) =========="
              cat build.log
              exit 1
            }
          echo "========== BUILD SUCCEEDED =========="
          tail -20 build.log

      - name: Debug - List build products
        if: always()
        run: |
          echo "=== .app files in build-output ==="
          find build-output -name "*.app" 2>/dev/null || echo "none"
          echo "=== .app files in build ==="
          find build -name "*.app" 2>/dev/null || echo "none"

      - name: Create IPA
        run: |
          APP_PATH=$(find build-output -name "毅练.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "毅练.app" | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find 毅练.app"
            echo "=== grep errors ==="
            grep -E "error:|fatal:" build.log | head -50 || echo "none"
            echo "=== tail build.log ==="
            tail -150 build.log
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          rm -rf "$APP_PATH"/PlugIns 2>/dev/null || true
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r YiLian.ipa Payload
          echo "IPA created"
          ls -la YiLian.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: YiLian-ipa
          path: YiLian.ipa
          retention-days: 30

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: build.log
          retention-days: 7
