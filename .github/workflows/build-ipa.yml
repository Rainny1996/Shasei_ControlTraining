name: Build 毅练 IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (无签名)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnostics - Environment
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== ls -la (root) ==="
          ls -la
          echo "=== git ls-files ==="
          git ls-files | head -50
          echo "=== locale ==="
          locale
          echo "=== available Xcode.app ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "NONE"
          echo "=== xcodebuild path ==="
          which xcodebuild

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          xcodebuild -version
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"

      - name: Locate project
        id: locate
        run: |
          # 在仓库根查找 .xcodeproj，兼容本地嵌套目录与仓库根直接包含两种情况
          PROJECT_FILE=$(find . -name "毅练.xcodeproj" -maxdepth 3 | head -1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "::error::Could not locate 毅练.xcodeproj"
            find . -name "*.xcodeproj" | head -20
            exit 1
          fi
          echo "PROJECT_FILE=$PROJECT_FILE" >> "$GITHUB_OUTPUT"
          echo "Found project at: $PROJECT_FILE"

      - name: Diagnostics - xcodebuild list
        run: |
          echo "=== xcodebuild -list ==="
          xcodebuild -list -project "${{ steps.locate.outputs.PROJECT_FILE }}" || echo "LIST FAILED with code $?"

      - name: Clean Build
        run: |
          rm -rf build build-output
          rm -rf ~/Library/Developer/Xcode/DerivedData/* || true

      - name: Build App (无签名)
        run: |
          set -o pipefail
          xcodebuild build \
            -project "${{ steps.locate.outputs.PROJECT_FILE }}" \
            -target "毅练" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            | tee build.log
          BUILD_RC=${PIPESTATUS[0]}
          if [ "$BUILD_RC" -ne 0 ]; then
            echo "========== BUILD FAILED (exit $BUILD_RC) =========="
            echo "::error::BUILD FAILED - 见下方错误"
            grep -E "error:|fatal:|** BUILD" build.log | head -40 | while read -r line; do echo "::error::$line"; done
            exit 1
          fi
          echo "========== BUILD SUCCEEDED =========="
          echo "=== .app files in DerivedData ==="
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" 2>/dev/null || echo "no .app found"
          tail -20 build.log

      - name: Debug - List build products
        if: always()
        run: |
          echo "=== .app files in DerivedData ==="
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" 2>/dev/null || echo "none"

      - name: Create IPA
        run: |
          set -o pipefail
          # 用通配 *.app 避免 macOS 中文文件名 NFC/NFD 规范化导致精确匹配失败
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find any .app"
            echo "::error::Could not find any .app"
            echo "=== DerivedData tree ==="
            find ~/Library/Developer/Xcode/DerivedData -maxdepth 6 -name "*.app" 2>/dev/null | head -60
            ls -laR ~/Library/Developer/Xcode/DerivedData/*/Build/Products/ 2>/dev/null | head -40
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          rm -rf "$APP_PATH"/PlugIns 2>/dev/null || true
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r YiLian.ipa Payload
          echo "IPA created"
          ls -la YiLian.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: YiLian-ipa
          path: YiLian.ipa
          retention-days: 30

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: build.log
          retention-days: 7
