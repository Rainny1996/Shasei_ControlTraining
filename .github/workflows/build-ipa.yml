name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Check Environment
        run: |
          echo "=== Xcode Version ==="
          xcodebuild -version
          echo ""
          echo "=== Available Xcode ==="
          ls /Applications/ | grep Xcode || true
          echo ""
          echo "=== XcodeGen Version ==="
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode Project
        run: |
          xcodegen generate 2>&1
          echo ""
          echo "=== Verify Project ==="
          if [ ! -d "ControlTraining.xcodeproj" ]; then
            echo "ERROR: ControlTraining.xcodeproj not found!"
            echo "Files in current directory:"
            ls -la
            exit 1
          fi
          echo "Project bundle contents:"
          ls -la ControlTraining.xcodeproj/
          echo ""
          echo "Project file size:"
          wc -l ControlTraining.xcodeproj/project.pbxproj

      - name: Verify Project Readable
        run: |
          xcodebuild -list -project ControlTraining.xcodeproj

      - name: Diagnose CoreData Model
        run: |
          echo "=== XcodeGen Version ==="
          xcodegen --version
          echo ""
          echo "=== Check xcdatamodeld directory structure ==="
          find ControlTraining -name "*.xcdatamodeld" -type d 2>/dev/null || echo "No xcdatamodeld found"
          find ControlTraining -name "*.xcdatamodel" -type d 2>/dev/null || echo "No xcdatamodel found"
          echo ""
          echo "=== List xcdatamodeld contents ==="
          XCDATAMODELD=$(find ControlTraining -name "*.xcdatamodeld" -type d | head -1)
          if [ -n "$XCDATAMODELD" ]; then
            echo "xcdatamodeld path: $XCDATAMODELD"
            ls -la "$XCDATAMODELD/"
            echo ""
            XCDATAMODEL=$(find "$XCDATAMODELD" -name "*.xcdatamodel" -type d | head -1)
            if [ -n "$XCDATAMODEL" ]; then
              echo "xcdatamodel path: $XCDATAMODEL"
              ls -la "$XCDATAMODEL/"
            fi
          fi
          echo ""
          echo "=== Check XCVersionGroup in project.pbxproj ==="
          grep -A5 -B2 "XCVersionGroup" ControlTraining.xcodeproj/project.pbxproj || echo "No XCVersionGroup found in project"
          echo ""
          echo "=== Check xcdatamodeld references in project.pbxproj ==="
          grep -i "xcdatamodel" ControlTraining.xcodeproj/project.pbxproj || echo "No xcdatamodel reference in project"
          echo ""
          echo "=== Check PBXFileReference for xcdatamodel ==="
          grep "wrapper.xcdatamodel" ControlTraining.xcodeproj/project.pbxproj || echo "No wrapper.xcdatamodel found"
          echo ""
          echo "=== Check CoreData model file encoding ==="
          MODEL_FILE=$(find ControlTraining -path "*/xcdatamodel/contents" | head -1)
          if [ -n "$MODEL_FILE" ]; then
            echo "Model file: $MODEL_FILE"
            file "$MODEL_FILE" || true
            echo "First 20 bytes (hex):"
            xxd -l 20 "$MODEL_FILE" || od -A x -t x1z -N 20 "$MODEL_FILE" || true
            echo "First 3 lines:"
            head -3 "$MODEL_FILE"
          fi
          echo ""
          echo "=== Check .xccurrentversion ==="
          VER_FILE=$(find ControlTraining -name ".xccurrentversion" | head -1)
          if [ -n "$VER_FILE" ]; then
            echo "Version file: $VER_FILE"
            file "$VER_FILE" || true
            echo "First 20 bytes (hex):"
            xxd -l 20 "$VER_FILE" || od -A x -t x1z -N 20 "$VER_FILE" || true
            cat "$VER_FILE"
          fi
          echo ""
          echo "=== Check build phase for xcdatamodeld ==="
          PBXPROJ=ControlTraining.xcodeproj/project.pbxproj
          # Find the XCVersionGroup object ID
          XCID=$(grep -B1 "XCVersionGroup" "$PBXPROJ" | head -1 | awk -F'/' '{print $2}' | tr -d ' ')
          if [ -n "$XCID" ]; then
            echo "XCVersionGroup ID: $XCID"
            # Check if it's in PBXBuildFile
            grep "$XCID" "$PBXPROJ" | head -5 || echo "XCVersionGroup ID not found in build files"
          fi

      - name: Clean Build
        run: |
          echo "=== Cleaning previous build artifacts ==="
          rm -rf build
          rm -rf ~/Library/Developer/Xcode/DerivedData/ControlTraining*
          echo "Clean complete"

      - name: Build App
        run: |
          set -o pipefail
          xcodebuild build \
            -project ControlTraining.xcodeproj \
            -scheme ControlTraining \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            2>&1 | tee build.log

      - name: Debug - List build products
        if: always()
        run: |
          echo "=== .app files ==="
          find build -name "*.app" 2>/dev/null || echo "No .app files found"
          echo ""
          echo "=== Build products directory ==="
          ls -laR build/Build/Products/ 2>/dev/null || echo "Products directory not found"

      - name: Create IPA
        run: |
          APP_PATH=$(find build -name "ControlTraining.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find ControlTraining.app"
            echo "=== Build errors (grep) ==="
            grep -E "error:|warning:|fatal:" build.log | head -50 || echo "No error lines found"
            echo ""
            echo "=== Last 150 lines of build log ==="
            tail -150 build.log
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          # 移除测试包 PlugIns（避免 LiveContainer 重签名失败）
          rm -rf "$APP_PATH"/PlugIns 2>/dev/null || true
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ControlTraining.ipa Payload
          echo "IPA created successfully"
          ls -la ControlTraining.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ControlTraining-ipa
          path: ControlTraining.ipa
          retention-days: 30

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: build.log
          retention-days: 7