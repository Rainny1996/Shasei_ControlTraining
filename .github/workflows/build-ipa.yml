name: Build 毅练 IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (无签名)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          xcodebuild -version

      - name: Locate project
        id: locate
        run: |
          PROJECT_FILE=$(find . -name "毅练.xcodeproj" -maxdepth 3 | head -1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "::error::Could not locate 毅练.xcodeproj"
            exit 1
          fi
          echo "PROJECT_FILE=$PROJECT_FILE" >> "$GITHUB_OUTPUT"
          echo "Found project at: $PROJECT_FILE"

      - name: Rename xcodeproj to ASCII & fix references
        run: |
          # 将中文 .xcodeproj 目录重命名为纯 ASCII，验证是否是中文路径导致 Xcode 解析崩溃
          OLD_NAME="毅练.xcodeproj"
          NEW_NAME="YiLian.xcodeproj"
          echo "Renaming $OLD_NAME -> $NEW_NAME"
          mv "$OLD_NAME" "$NEW_NAME"

          # 修改 pbxproj 内部引用：把 毅练/Info.plist 改为 ASCII 路径
          # 源码目录仍然是 毅练/，但 .xcodeproj 名改为 ASCII
          echo "=== pbxproj 内部路径引用 ==="
          grep -n "毅练" "$NEW_NAME/project.pbxproj" | head -20

      - name: Create workspace manually
        run: |
          # 用 ASCII 路径
          ABS_PROJECT="$(pwd)/YiLian.xcodeproj"
          echo "Absolute project path: $ABS_PROJECT"

          mkdir -p YiLian.xcworkspace
          cat > YiLian.xcworkspace/contents.xcworkspacedata << XMLEND
          <?xml version="1.0" encoding="UTF-8"?>
          <Workspace
             version = "1.0">
             <FileRef
                location = "absolute:${ABS_PROJECT}">
             </FileRef>
          </Workspace>
          XMLEND

          echo "=== workspace contents ==="
          cat YiLian.xcworkspace/contents.xcworkspacedata

      - name: Clean Build
        run: |
          rm -rf build build-output
          rm -rf ~/Library/Developer/Xcode/DerivedData/* || true

      - name: Build App
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace YiLian.xcworkspace \
            -scheme "毅练" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            | tee build.log
          BUILD_RC=${PIPESTATUS[0]}
          if [ "$BUILD_RC" -ne 0 ]; then
            echo "========== BUILD FAILED (exit $BUILD_RC) =========="
            echo "::error::BUILD FAILED"
            grep -E "error:|fatal:|** BUILD" build.log | head -40 | while read -r line; do echo "::error::$line"; done
            exit 1
          fi
          echo "========== BUILD SUCCEEDED =========="
          echo "=== .app files in DerivedData ==="
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" 2>/dev/null || echo "no .app found"
          tail -20 build.log

      - name: Debug - List build products
        if: always()
        run: |
          echo "=== .app files in DerivedData ==="
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" 2>/dev/null || echo "none"

      - name: Create IPA
        run: |
          set -o pipefail
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find any .app"
            echo "::error::Could not find any .app"
            find ~/Library/Developer/Xcode/DerivedData -maxdepth 6 -name "*.app" 2>/dev/null | head -60
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          rm -rf "$APP_PATH"/PlugIns 2>/dev/null || true
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r YiLian.ipa Payload
          echo "IPA created"
          ls -la YiLian.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: YiLian-ipa
          path: YiLian.ipa
          retention-days: 30

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: build.log
          retention-days: 7
