name: ControlTraining
options:
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  bundleIdPrefix: com.controltraining

targets:
  ControlTraining:
    type: application
    platform: iOS
    sources:
      - ControlTraining
    dependencies:
      - framework: Charts.framework
      - framework: AVFoundation.framework
      - framework: LocalAuthentication.framework
      - framework: CryptoKit.framework
      - framework: Security.framework
      - framework: UserNotifications.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.controltraining.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ControlTraining/App/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_BITCODE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"