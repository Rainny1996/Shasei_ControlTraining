name: ControlTraining
options:
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  bundleIdPrefix: com.controltraining

targets:
  ControlTraining:
    type: application
    platform: iOS
    sources:
      - ControlTraining
    dependencies:
      - framework: Charts.framework
        embed: false
      - framework: AVFoundation.framework
        embed: false
      - framework: LocalAuthentication.framework
        embed: false
      - framework: CryptoKit.framework
        embed: false
      - framework: Security.framework
        embed: false
      - framework: UserNotifications.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.controltraining.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ControlTraining/App/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_BITCODE: NO
        ENABLE_TESTABILITY: "YES"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"

  ControlTrainingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ControlTrainingTests
    dependencies:
      - target: ControlTraining
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ControlTraining.app/ControlTraining
        BUNDLE_LOADER: $(TEST_HOST)
        CODE_SIGNING_ALLOWED: "NO"

  ControlTrainingUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ControlTrainingUITests
    dependencies:
      - target: ControlTraining
    settings:
      base:
        SWIFT_VERSION: "5.9"
        CODE_SIGNING_ALLOWED: "NO"

schemes:
  ControlTraining:
    build:
      targets:
        ControlTraining: all
    test:
      targets:
        - ControlTrainingTests
        - ControlTrainingUITests